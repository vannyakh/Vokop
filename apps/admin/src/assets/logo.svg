<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <!-- Vibrant Glowing Filter -->
    <filter id="neon-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Gradients -->
    <linearGradient id="left-ribbon" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>
    
    <linearGradient id="right-ribbon" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24" />
      <stop offset="100%" stop-color="#f59e0b" />
    </linearGradient>

    <linearGradient id="accent-glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ec4899" />
      <stop offset="100%" stop-color="#8b5cf6" />
    </linearGradient>
  </defs>

  <!-- Left Ribbon (Indigo/Blue) -->
  <path d="M22,18 L38,18 L54,72 L38,82 Z" fill="url(#left-ribbon)" />

  <!-- Right Ribbon (Amber/Gold) -->
  <path d="M78,18 L62,18 L46,72 L62,82 Z" fill="url(#right-ribbon)" />

  <!-- Overlap visual shadow / cut -->
  <path d="M46,72 L54,72 L38,82 L38,82 Z" fill="#000000" opacity="0.25" />

  <!-- Modern Cyberpunk Inner Lines/Circuit Detail -->
  <path d="M30,24 L42,60 M70,24 L58,60" stroke="#ffffff" stroke-width="2" stroke-linecap="round" opacity="0.35" />

  <!-- Center Core Star/Diamond Accent -->
  <polygon points="50,44 54,50 50,56 46,50" fill="#ffffff" filter="url(#neon-glow)" />
</svg>
